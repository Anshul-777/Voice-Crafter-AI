version: '3.9'

# Lightweight dev compose: builds only the core services (api + frontend + infra)
# Use this to validate the API and frontend without building heavy ML worker images.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: voicecrafter
      POSTGRES_USER: voicecrafter
      POSTGRES_PASSWORD: voicecrafter
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        REQUIREMENTS_FILE: requirements.runtime.txt
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://voicecrafter:voicecrafter@postgres:5432/voicecrafter
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      STORAGE_BACKEND: minio
      STORAGE_ENDPOINT: minio:9000
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_SECURE: "false"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
      - minio
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --loop asyncio

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
      VITE_WS_URL: ws://localhost:8000
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  minio_data:
  model_cache:
