services:
  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: vc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: voicecrafter
      POSTGRES_USER: voicecrafter
      POSTGRES_PASSWORD: voicecrafter
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voicecrafter"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: vc-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO (S3-compatible storage) ───────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: vc-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── FastAPI Backend ──────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        REQUIREMENTS_FILE: requirements.runtime.txt
    container_name: vc-api
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://voicecrafter:voicecrafter@postgres:5432/voicecrafter
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      STORAGE_BACKEND: minio
      STORAGE_ENDPOINT: minio:9000
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_SECURE: "false"
    ports:
      - "8000:8000"
    volumes:
      - model_cache:/root/.cache
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --loop asyncio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── Celery Worker (Detection + Cloning) ─────────────────────────────────────
  worker-detection:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vc-worker-detection
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://voicecrafter:voicecrafter@postgres:5432/voicecrafter
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      STORAGE_BACKEND: minio
      STORAGE_ENDPOINT: minio:9000
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_SECURE: "false"
    volumes:
      - model_cache:/root/.cache
      - ./backend:/app
    depends_on:
      - postgres
      - redis
      - minio
    command: celery -A app.workers.celery_app worker -Q detection,cloning -c 2 --loglevel=info

  # ─── Celery Worker (Generation + Quality) ────────────────────────────────────
  worker-generation:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vc-worker-generation
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://voicecrafter:voicecrafter@postgres:5432/voicecrafter
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      STORAGE_BACKEND: minio
      STORAGE_ENDPOINT: minio:9000
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_SECURE: "false"
    volumes:
      - model_cache:/root/.cache
      - ./backend:/app
    depends_on:
      - postgres
      - redis
      - minio
    command: celery -A app.workers.celery_app worker -Q generation,default -c 4 --loglevel=info

  # ─── Celery Beat (Scheduler) ──────────────────────────────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        REQUIREMENTS_FILE: requirements.runtime.txt
    container_name: vc-celery-beat
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://voicecrafter:voicecrafter@postgres:5432/voicecrafter
      CELERY_BROKER_URL: redis://redis:6379/1
    volumes:
      - ./backend:/app
    depends_on:
      - redis
    command: celery -A app.workers.celery_app beat --loglevel=info

  # ─── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vc-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
      VITE_WS_URL: ws://localhost:8000
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  minio_data:
  model_cache:

networks:
  default:
    name: voicecrafter-network
